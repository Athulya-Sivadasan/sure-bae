<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sure Bae – AI Study Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --p:#7F77DD;--pd:#534AB7;--pdd:#3C3489;
  --bg:#0a0a0f;--s1:#13121a;--s2:#1c1a27;--s3:#252336;
  --br:#2a2640;--br2:#3d3860;
  --tx:#f0eeff;--tm:#b8b4e0;--ts:#6e6a8a;
  --green:#4ade80;--red:#e24b4a;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;overflow:hidden}
body{display:flex;align-items:stretch;justify-content:center;height:100vh;height:100dvh;padding:0;margin:0}

.card{width:100%;max-width:720px;height:100vh;height:100dvh;background:var(--s1);border-left:1px solid var(--br);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(127,119,221,.15)}
@media(min-width:720px){body{background:var(--bg) radial-gradient(ellipse at 50% 0%,rgba(127,119,221,.08) 0%,transparent 70%)}}
@media(max-width:480px){.card{border-left:none;border-right:none;max-width:100%}}

/* HEADER */
.hdr{background:var(--bg);border-bottom:1px solid var(--br);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-av{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--p);box-shadow:0 0 12px rgba(127,119,221,.35);flex-shrink:0;background:var(--s2)}
.hdr-name{font-size:15px;font-weight:700;color:var(--tx)}.hdr-name .violet{color:var(--p)}
.hdr-sub{font-size:9.5px;color:var(--ts)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.online{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px}
.online::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.hbtn{background:none;border:none;cursor:pointer;font-size:17px;padding:3px 5px;border-radius:6px;color:var(--ts);transition:background .2s}
.hbtn:hover{background:var(--s2);color:var(--p)}

/* MESSAGES */
#msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px}

.msg{display:flex;gap:8px;align-items:flex-end}
.msg.u{flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;object-fit:cover;border:1.5px solid var(--br)}
.uav{background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;border:none}

.bub{max-width:78%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.7;word-break:break-word}
@media(min-width:600px){.bub{font-size:14.5px}}
.msg.b .bub{background:var(--s2);border:1px solid var(--br);border-bottom-left-radius:3px;color:var(--tx)}
.msg.u .bub{background:var(--p);color:#fff;border-bottom-right-radius:3px}
.bub b{font-weight:600}
.msg.b .bub b{color:#c9c4ff}
.bub ul{padding-left:16px;margin-top:4px;display:flex;flex-direction:column;gap:3px}
.bub li{font-size:12.5px;color:var(--tm)}
.msg.u .bub li{color:#e8e0ff}
.fchip{display:inline-flex;align-items:center;gap:5px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:3px 8px;font-size:11px;margin-top:5px}

.typing-w{display:flex;gap:8px;align-items:flex-end}
.typing-b{background:var(--s2);border:1px solid var(--br);border-radius:14px;border-bottom-left-radius:3px;padding:10px 13px;display:flex;gap:4px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--p);animation:bl 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ATTACH BAR */
#abar{background:var(--bg);border-top:1px solid var(--br);padding:6px 12px;display:none;flex-wrap:wrap;gap:5px;flex-shrink:0}
.achip{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--br2);border-radius:0;padding:3px 9px;font-size:11px;color:var(--tm)}
.arm{background:none;border:none;cursor:pointer;color:var(--ts);font-size:13px;padding:0 0 0 3px;line-height:1}
.arm:hover{color:var(--red)}

#micSt{font-size:11px;color:var(--red);padding:3px 14px;background:var(--bg);border-top:1px solid var(--br);display:none;flex-shrink:0}

/* TOOLBAR */
.toolbar{border-top:1px solid var(--br);background:var(--bg);padding:10px 12px;display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
.tbtn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid var(--br2);background:var(--s2);cursor:pointer;font-size:17px;flex-shrink:0;transition:all .2s}
.tbtn:hover{border-color:var(--p);background:var(--s3)}
.tbtn input{display:none}
#micBtn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;border:1px solid var(--br2);background:var(--s2);cursor:pointer;font-size:17px;flex-shrink:0;transition:all .2s}
#micBtn:hover{border-color:var(--p)}
#micBtn.active{border-color:var(--red);background:#1a0a0a;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
#inp{flex:1;background:var(--s2);border:1px solid var(--br);color:var(--tx);padding:8px 12px;border-radius:9px;font-size:13px;font-family:inherit;resize:none;outline:none;line-height:1.5;max-height:100px;overflow-y:auto;transition:border-color .2s}
#inp:focus{border-color:var(--p)}
#inp::placeholder{color:var(--ts)}
#sbtn{width:34px;height:34px;background:var(--p);border:none;border-radius:9px;cursor:pointer;font-size:17px;flex-shrink:0;color:#fff;transition:background .2s}
#sbtn:hover{background:var(--pdd)}
#sbtn:disabled{opacity:.4;cursor:not-allowed}
.badge{font-size:9px;color:var(--ts);text-align:center;padding:4px;background:var(--bg);flex-shrink:0}
.badge span{color:var(--p)}
</style>
</head>

// history uses Mistral format: [{role:'user'|'assistant', content: string}]
let history = [], pendingFiles = [], isRecording = false, recog = null;

window.addEventListener('DOMContentLoaded', () => {
  addWelcome();
  bindEvents();
});

function bindEvents() {
  document.getElementById('clearBtn').onclick = () => { history = []; document.getElementById('msgs').innerHTML = ''; addWelcome() };
  document.getElementById('sbtn').onclick = send;
  document.getElementById('inp').onkeydown = e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} };
  document.getElementById('inp').oninput = autoResize;
  document.getElementById('fInput').onchange = e => { Array.from(e.target.files).forEach(f=>pendingFiles.push(f)); e.target.value=''; renderAbar() };
  document.getElementById('micBtn').onclick = toggleMic;
}

function addWelcome() {
  addBot(`Hey bestie! 👻💜 I'm <b>Sure <span style="color:var(--p)">Bae</span></b> — your personal study ghost.<br><br>I can help you with:<br><ul><li>Any subject or topic</li><li>Uploaded PDFs, images, docs, PPTs 📄</li><li>Voice questions 🎤</li><li>Exam prep & quick notes</li></ul><br>What are we studying today?`);
}

function addBot(html) {
  const d = document.createElement('div'); d.className = 'msg b';
  d.innerHTML = `<img src="${AVATAR}" class="av" alt="Sure Bae"><div class="bub">${html}</div>`;
  append(d);
}
function addUser(html) {
  const d = document.createElement('div'); d.className = 'msg u';
  d.innerHTML = `<div class="bub">${html}</div><div class="av uav">U</div>`;
  append(d);
}
function append(el) { const m=document.getElementById('msgs'); m.appendChild(el); m.scrollTop=m.scrollHeight }
function showTyping() {
  const m=document.getElementById('msgs');
  const d=document.createElement('div'); d.className='typing-w'; d.id='typing';
  d.innerHTML=`<img src="${AVATAR}" class="av"><div class="typing-b"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  m.appendChild(d); m.scrollTop=m.scrollHeight;
}
function hideTyping() { const t=document.getElementById('typing'); if(t) t.remove() }

function fileIcon(n) {
  const e=(n.split('.').pop()||'').toLowerCase();
  if(['jpg','jpeg','png','gif','webp'].includes(e)) return '🖼️';
  if(e==='pdf') return '📄';
  if(['ppt','pptx'].includes(e)) return '📊';
  if(['doc','docx'].includes(e)) return '📝';
  if(['csv','xlsx'].includes(e)) return '📈';
  if(['py','js','html','css','json'].includes(e)) return '💻';
  return '📎';
}
function renderAbar() {
  const bar=document.getElementById('abar');
  if(!pendingFiles.length){bar.style.display='none';return}
  bar.style.display='flex'; bar.innerHTML='';
  pendingFiles.forEach((f,i)=>{
    const c=document.createElement('div'); c.className='achip';
    c.innerHTML=`${fileIcon(f.name)}<span style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.name}</span><button class="arm" onclick="rmFile(${i})">✕</button>`;
    bar.appendChild(c);
  });
}
window.rmFile = i => { pendingFiles.splice(i,1); renderAbar() };
function toB64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f)})}

async function send() {
  const inp=document.getElementById('inp');
  const q=inp.value.trim();
  const fs=[...pendingFiles];
  if(!q&&!fs.length) return;
  inp.value=''; inp.style.height='auto';
  pendingFiles=[]; renderAbar();

  const chips=fs.map(f=>`<span class="fchip">${fileIcon(f.name)} ${f.name}</span>`).join('');
  addUser((q||'Summarise this for me')+(chips?'<br>'+chips:''));
  showTyping();
  document.getElementById('sbtn').disabled=true;

  try {
    // Build the user content string for this turn
    let userContent = q || 'Summarise this clearly in an exam-ready, concise way.';

    // Append file text inline (Mistral text-only; images described as attachment note)
    for(const f of fs){
      if(f.type.startsWith('image/')){
        userContent += `\n\n[Image attached: ${f.name} — please describe or analyse it based on context.]`;
      } else if(f.type==='application/pdf'){
        userContent += `\n\n[PDF attached: ${f.name} — please summarise or analyse it based on context.]`;
      } else {
        try{
          const t=await f.text();
          userContent += `\n\n📎 ${f.name}:\n${t.slice(0,8000)}`;
        }catch{}
      }
    }

    // Add current user turn to history
    history.push({role:'user', content: userContent});

    // Keep last 20 messages (10 turns)
    if(history.length>20) history=history.slice(-20);

    // Build Mistral messages array: system msg first, then history
    const messages = [
      {role:'system', content: SYSTEM},
      ...history
    ];

    const res=await fetch(WORKER,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages,
        max_tokens: 1024,
        temperature: 0.75
      })
    });

    const data=await res.json();

    // Mistral response shape: data.choices[0].message.content
    if(data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const text = data.choices?.[0]?.message?.content || 'No response. Try again 💜';

    // Add assistant reply to history
    history.push({role:'assistant', content: text});
    if(history.length>20) history=history.slice(-20);

    hideTyping();
    addBot(fmt(text));
  } catch(e) {
    hideTyping();
    addBot('Something went wrong: '+e.message+' 💜 Try again!');
  }
  document.getElementById('sbtn').disabled=false;
}

function fmt(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.*?)\*/g,'<i>$1</i>')
    .replace(/^#{1,3}\s(.+)$/gm,'<b style="font-size:14px">$1</b>')
    .replace(/^[-•*]\s(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*?<\/li>(\n|$))+/g,m=>`<ul>${m}</ul>`)
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}
function autoResize(){const el=document.getElementById('inp');el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px'}

function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){alert('Use Chrome for voice input!');return}
  if(isRecording){recog?.stop();return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();recog.lang='en-US';recog.interimResults=true;
  recog.onstart=()=>{isRecording=true;document.getElementById('micBtn').classList.add('active');document.getElementById('micBtn').textContent='🔴';document.getElementById('micSt').textContent='🎤 Listening...';document.getElementById('micSt').style.display='block'};
  recog.onresult=e=>{document.getElementById('inp').value=Array.from(e.results).map(r=>r[0].transcript).join('');autoResize()};
  recog.onend=()=>{isRecording=false;document.getElementById('micBtn').classList.remove('active');document.getElementById('micBtn').textContent='🎤';document.getElementById('micSt').style.display='none'};
  recog.onerror=()=>{isRecording=false;document.getElementById('micBtn').textContent='🎤';document.getElementById('micSt').style.display='none'};
  recog.start();
}
